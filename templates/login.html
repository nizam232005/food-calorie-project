{% extends "base.html" %}
{% block title %}Login - NutriSmart{% endblock %}

{% block content %}
<section class="container"
    style="padding: 60px 20px; display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass animate-fade-in" style="width: 100%; max-width: 450px; padding: 50px;">
        <h2 style="text-align: center; margin-bottom: 10px;">Welcome Back</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 40px;">Log in to track your nutrition</p>

        <form method="post">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 14px;">Sign
                In</button>
        </form>

        <p style="text-align: center; margin-top: 30px; font-size: 0.95rem; color: var(--text-muted);">
            Don't have an account? <a href="/register"
                style="color: var(--primary); font-weight: 600; text-decoration: none;">Join Free</a>
        </p>
    </div>
</section>
{% endblock %}
