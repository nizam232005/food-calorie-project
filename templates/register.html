{% extends "base.html" %}
{% block title %}Create Account - NutriSmart{% endblock %}

{% block content %}
<section class="container" style="padding: 60px 20px; display: flex; justify-content: center; align-items: center;">
    <div class="glass animate-fade-in" style="width: 100%; max-width: 600px; padding: 50px;">
        <h2 style="text-align: center; margin-bottom: 10px;">Create Your Profile</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 40px;">Start your personalized nutrition
            journey</p>

        <form method="post">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input name="name" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a strong password">
            </div>

            <h3 style="margin: 30px 0 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">
                Personal Details</h3>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" placeholder="25">
                </div>
                <div class="form-group">
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" name="height" placeholder="175">
                </div>
                <div class="form-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" id="weight" name="weight" placeholder="70">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="activity_level">Activity Level</label>
                    <select id="activity_level" name="activity_level">
                        <option value="sedentary">Sedentary</option>
                        <option value="lightly_active">Lightly Active</option>
                        <option value="moderately_active" selected>Moderately Active</option>
                        <option value="very_active">Very Active</option>
                        <option value="extra_active">Extra Active</option>
                    </select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label for="goal">Your Goal</label>
                    <select id="goal" name="goal">
                        <option value="weight_loss">Weight Loss</option>
                        <option value="maintain">Maintain Weight</option>
                        <option value="muscle_gain">Gain Muscle</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="diet">Dietary Preference</label>
                    <select id="diet" name="diet">
                        <option value="non-veg">Non-Vegetarian</option>
                        <option value="veg">Vegetarian</option>
                        <option value="vegan">Vegan</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px; padding: 18px;">Create
                My Account</button>
        </form>

        <p style="text-align: center; margin-top: 30px; font-size: 0.95rem; color: var(--text-muted);">
            Already have an account? <a href="/login"
                style="color: var(--primary); font-weight: 600; text-decoration: none;">Log In</a>
        </p>
    </div>
</section>
{% endblock %}
